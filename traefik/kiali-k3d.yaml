http:
  serversTransports:
    kiali-k3d-transport:
      insecureSkipVerify: true
  services:
    kiali-k3d:
      loadBalancer:
        passHostHeader: true
        serversTransport: kiali-k3d-transport
        servers:
          - url: 'https://k3d-hyhome-serverlb:443'
  routers:
    kiali-k3d:
      rule: 'Host(`kiali.127.0.0.1.nip.io`)'
      entryPoints:
        - websecure
      service: kiali-k3d
      tls: {}
