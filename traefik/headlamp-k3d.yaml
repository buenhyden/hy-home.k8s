# Traefik dynamic configuration for Headlamp via k3d ingress-nginx
# Apply this file to your external Traefik dynamic config directory.
# Pattern mirrors argocd-k3d.yaml.
#
# Traffic flow:
#   Browser → Traefik (websecure/443) → k3d-hyhome-serverlb:443
#     → ingress-nginx LoadBalancer → Headlamp service (headlamp:4466)
#
# TLS: Traefik terminates with its own cert (nip.io wildcard or mkcert).
#      insecureSkipVerify=true skips validation of the ingress-nginx
#      backend cert (signed by local mkcert CA).

http:
  serversTransports:
    headlamp-k3d-transport:
      insecureSkipVerify: true

  services:
    headlamp-k3d:
      loadBalancer:
        passHostHeader: true
        serversTransport: headlamp-k3d-transport
        servers:
          - url: 'https://k3d-hyhome-serverlb:443'

  routers:
    headlamp-k3d:
      rule: 'Host(`headlamp.127.0.0.1.nip.io`)'
      entryPoints:
        - websecure
      service: headlamp-k3d
      tls: {}
