# Traefik dynamic configuration for Argo Rollouts Dashboard via k3d ingress-nginx
# Apply this file to your external Traefik dynamic config directory.
# Pattern mirrors argocd-k3d.yaml.
#
# Traffic flow:
#   Browser → Traefik (websecure/443) → ingress-nginx LoadBalancer IP:443
#     → Rollouts Dashboard service (argo-rollouts:3100)
#
# TLS: Traefik terminates with its own cert (nip.io wildcard or mkcert).
#      insecureSkipVerify=true skips validation of the ingress-nginx
#      backend cert (signed by local mkcert CA).

http:
  serversTransports:
    rollouts-k3d-transport:
      insecureSkipVerify: true

  services:
    rollouts-k3d:
      loadBalancer:
        passHostHeader: true
        serversTransport: rollouts-k3d-transport
        servers:
          - url: 'https://172.18.0.240:443'

  routers:
    rollouts-k3d:
      rule: 'Host(`rollouts.127.0.0.1.nip.io`)'
      entryPoints:
        - websecure
      service: rollouts-k3d
      tls: {}
