http:
  serversTransports:
    dashboard-k3d-transport:
      insecureSkipVerify: true
  services:
    dashboard-k3d:
      loadBalancer:
        passHostHeader: true
        serversTransport: dashboard-k3d-transport
        servers:
          - url: 'https://k3d-hyhome-serverlb:443'
  routers:
    dashboard-k3d:
      rule: 'Host(`k8s-dashboard.127.0.0.1.nip.io`)'
      entryPoints:
        - websecure
      service: dashboard-k3d
      tls: {}
