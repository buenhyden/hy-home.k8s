http:
  serversTransports:
    argocd-k3d-transport:
      insecureSkipVerify: true

  services:
    argocd-k3d:
      loadBalancer:
        passHostHeader: true
        serversTransport: argocd-k3d-transport
        servers:
          - url: "https://k3d-hyhome-serverlb:443"

  routers:
    argocd-k3d:
      rule: "Host(`argocd.127.0.0.1.nip.io`)"
      entryPoints:
        - websecure
      service: argocd-k3d
      tls: {}
