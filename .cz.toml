[tool.commitizen]
name = "cz_customize"

[tool.commitizen.customize]
schema = "<type>(<scope>): <subject>\n\n[optional body]\n\n[optional footer]"
example = "feat(auth): Add login flow"
info_path = ".gitmessage"
message_template = "{{change_type}}{% if scope %}({{scope}}){% endif %}: {{subject}}{% if body %}\n\n{{body}}{% endif %}{% if footer %}\n\n{{footer}}{% endif %}"
schema_pattern = "^(feat|fix|refactor|style|docs|test|build|ci|perf|revert|chore|release|deps)(\\([^()\\r\\n]+\\))?: (([A-Z])|([^A-Za-z]))[^\\n]*[^.\\n](\\n\\n[\\s\\S]+)?$"
commit_parser = "^(?P<change_type>feat|fix|refactor|style|docs|test|build|ci|perf|revert|chore|release|deps)(?:\\((?P<scope>[^()\\r\\n]+)\\))?: (?P<message>[^\\n]+)(?:\\n\\n(?P<body>[\\s\\S]+))?$"
changelog_pattern = "^(feat|fix|refactor|style|docs|test|build|ci|perf|revert|chore|release|deps)(\\([^()\\r\\n]+\\))?:"
change_type_map = { feat = "Feat", fix = "Fix", refactor = "Refactor", style = "Style", docs = "Docs", test = "Test", build = "Build", ci = "CI", perf = "Perf", revert = "Revert", chore = "Chore", release = "Release", deps = "Deps" }
change_type_order = ["Feat", "Fix", "Refactor", "Perf", "Docs", "Test", "Build", "CI", "Style", "Deps", "Chore", "Revert", "Release"]

[[tool.commitizen.customize.questions]]
type = "select"
name = "change_type"
message = "커밋 타입을 선택하세요"
use_search_filter = true
choices = [
  { value = "feat", name = "feat: 새로운 기능 추가" },
  { value = "fix", name = "fix: 버그 수정" },
  { value = "refactor", name = "refactor: 기능 변화 없는 구조 개선" },
  { value = "style", name = "style: 포맷팅 등 비기능 변경" },
  { value = "docs", name = "docs: 문서 수정" },
  { value = "test", name = "test: 테스트 추가/수정/삭제" },
  { value = "build", name = "build: 빌드 시스템 또는 외부 종속성 수정" },
  { value = "ci", name = "ci: CI 설정 및 스크립트 수정" },
  { value = "perf", name = "perf: 성능 개선" },
  { value = "revert", name = "revert: 이전 커밋 되돌리기" },
  { value = "chore", name = "chore: 기타 유지보수 작업" },
  { value = "release", name = "release: 버전 릴리즈" },
  { value = "deps", name = "deps: 의존성 업데이트" },
]

[[tool.commitizen.customize.questions]]
type = "input"
name = "scope"
message = "변경 범위(scope)를 입력하세요 (선택)"

[[tool.commitizen.customize.questions]]
type = "input"
name = "subject"
message = "제목(subject)을 입력하세요 (영문은 첫 글자 대문자, 끝 마침표 금지)"

[[tool.commitizen.customize.questions]]
type = "input"
name = "body"
message = "본문(body)을 입력하세요 (선택, 여러 줄 가능)"
multiline = true

[[tool.commitizen.customize.questions]]
type = "input"
name = "footer"
message = "꼬릿말(footer)을 입력하세요 (선택, 여러 줄 가능)"
multiline = true
