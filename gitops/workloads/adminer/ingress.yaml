apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adminer
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: mkcert-ca-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx
  rules:
    - host: adminer.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adminer
                port:
                  number: 8080
  tls:
    - hosts:
        - adminer.127.0.0.1.nip.io
      secretName: adminer-tls # pragma: allowlist secret
