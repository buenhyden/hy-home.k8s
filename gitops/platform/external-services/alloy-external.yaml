apiVersion: v1
kind: Service
metadata:
  name: alloy-external
  namespace: platform
spec:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: alloy-external-1
  namespace: platform
  labels:
    kubernetes.io/service-name: alloy-external
addressType: IPv4
ports:
  - name: otlp-grpc
    protocol: TCP
    port: 4317
  - name: otlp-http
    protocol: TCP
    port: 4318
endpoints:
  - addresses:
      - 172.18.0.11
