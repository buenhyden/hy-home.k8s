apiVersion: v1
kind: Service
metadata:
  name: grafana-external
  namespace: platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: grafana-external-1
  namespace: platform
  labels:
    kubernetes.io/service-name: grafana-external
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 3000
endpoints:
  - addresses:
      - 172.18.0.14
