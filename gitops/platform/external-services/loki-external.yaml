apiVersion: v1
kind: Service
metadata:
  name: loki-external
  namespace: platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3100
      targetPort: 3100
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: loki-external-1
  namespace: platform
  labels:
    kubernetes.io/service-name: loki-external
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 3100
endpoints:
  - addresses:
      - 172.18.0.13
