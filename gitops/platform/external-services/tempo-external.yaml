apiVersion: v1
kind: Service
metadata:
  name: tempo-external
  namespace: platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3200
      targetPort: 3200
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: tempo-external-1
  namespace: platform
  labels:
    kubernetes.io/service-name: tempo-external
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 3200
endpoints:
  - addresses:
      - 172.18.0.12
