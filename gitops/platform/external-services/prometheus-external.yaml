apiVersion: v1
kind: Service
metadata:
  name: prometheus-external
  namespace: platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: prometheus-external-1
  namespace: platform
  labels:
    kubernetes.io/service-name: prometheus-external
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 9090
endpoints:
  - addresses:
      - 172.18.0.10
