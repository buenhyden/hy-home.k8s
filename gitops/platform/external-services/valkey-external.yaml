apiVersion: v1
kind: Service
metadata:
  name: valkey-external
  namespace: platform
spec:
  type: ClusterIP
  ports:
    - name: valkey
      port: 6379
      targetPort: 6379
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: valkey-external-1
  namespace: platform
  labels:
    kubernetes.io/service-name: valkey-external
addressType: IPv4
ports:
  - name: valkey
    protocol: TCP
    port: 6379
endpoints:
  - addresses:
      - 172.19.0.12
