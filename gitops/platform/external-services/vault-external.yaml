apiVersion: v1
kind: Service
metadata:
  name: vault-external
  namespace: platform
spec:
  ports:
    - name: http
      port: 8200
      targetPort: 8200
  type: ClusterIP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: vault-external-1
  namespace: platform
  labels:
    kubernetes.io/service-name: vault-external
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 8200
endpoints:
  - addresses:
      - 172.30.0.10
