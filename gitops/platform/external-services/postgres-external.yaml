apiVersion: v1
kind: Service
metadata:
  name: postgres-external
  namespace: platform
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: postgres-external-1
  namespace: platform
  labels:
    kubernetes.io/service-name: postgres-external
addressType: IPv4
ports:
  - name: postgres
    protocol: TCP
    port: 5432
endpoints:
  - addresses:
      - 172.30.0.11
