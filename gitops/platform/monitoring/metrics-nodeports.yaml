# Platform 컴포넌트 메트릭 NodePort 서비스
# 외부 Prometheus(Docker)가 클러스터 내부 컴포넌트 메트릭을 수집하기 위한 NodePort 노출
# NodePort 예약:
#   30090 — istiod metrics (port 15014)
#   30092 — argo-rollouts metrics (port 8090)
---
# istiod 메트릭 NodePort (port 15014)
# Istio control plane: xDS push count, pilot_k8s_cfg_events, pilot_xds_pushes 등
apiVersion: v1
kind: Service
metadata:
  name: istiod-metrics-np
  namespace: istio-system
  labels:
    app: istiod
    app.kubernetes.io/component: metrics-nodeport
spec:
  type: NodePort
  selector:
    app: istiod
  ports:
    - name: http-monitoring
      port: 15014
      targetPort: 15014
      nodePort: 30090
---
# Argo Rollouts 메트릭 NodePort (port 8090)
# rollout_phase, rollout_info, analysis_run_info 등 progressive delivery 지표
apiVersion: v1
kind: Service
metadata:
  name: argo-rollouts-metrics-np
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/name: argo-rollouts
    app.kubernetes.io/component: metrics-nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argo-rollouts
  ports:
    - name: metrics
      port: 8090
      targetPort: 8090
      nodePort: 30092
