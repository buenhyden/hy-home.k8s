apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-secrets-egress-to-vault
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Vault external service endpoint (mng-vault on k3d-hyhome network)
    - to:
        - ipBlock:
            cidr: 172.18.0.8/32
      ports:
        - protocol: TCP
          port: 8200
    # kube-dns for Vault service discovery
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API server for controller reconciliation
    - to:
        - ipBlock:
            cidr: 172.18.0.0/24
      ports:
        - protocol: TCP
          port: 6443
