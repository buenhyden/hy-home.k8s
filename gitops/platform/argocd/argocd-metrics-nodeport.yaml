# ArgoCD Metrics NodePort Services
# Prometheus(Docker, 172.18.0.10)가 k3d 노드(172.18.0.2)를 통해 ArgoCD 메트릭을 수집하기 위한 NodePort 노출
# NodePort 범위: 30082-30086 (충돌 없음 확인됨)
---
# Application Controller Metrics (port 8082)
apiVersion: v1
kind: Service
metadata:
  name: argocd-application-controller-metrics-np
  namespace: argocd
  labels:
    app.kubernetes.io/component: application-controller
    app.kubernetes.io/part-of: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-application-controller
  ports:
    - name: metrics
      port: 8082
      targetPort: 8082
      nodePort: 30082
---
# Server Metrics (port 8083)
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-metrics-np
  namespace: argocd
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: metrics
      port: 8083
      targetPort: 8083
      nodePort: 30083
---
# Repo Server Metrics (port 8084)
apiVersion: v1
kind: Service
metadata:
  name: argocd-repo-server-metrics-np
  namespace: argocd
  labels:
    app.kubernetes.io/component: repo-server
    app.kubernetes.io/part-of: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-repo-server
  ports:
    - name: metrics
      port: 8084
      targetPort: 8084
      nodePort: 30084
---
# ApplicationSet Controller Metrics (port 8080)
apiVersion: v1
kind: Service
metadata:
  name: argocd-applicationset-controller-metrics-np
  namespace: argocd
  labels:
    app.kubernetes.io/component: applicationset-controller
    app.kubernetes.io/part-of: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-applicationset-controller
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      nodePort: 30085
---
# Notifications Controller Metrics (port 9001)
apiVersion: v1
kind: Service
metadata:
  name: argocd-notifications-controller-metrics-np
  namespace: argocd
  labels:
    app.kubernetes.io/component: notifications-controller
    app.kubernetes.io/part-of: argocd
