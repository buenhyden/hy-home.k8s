apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform components (ingress, eso, networkpolicy, external endpoints)
  sourceRepos:
    - https://github.com/buenhyden/hy-home.k8s.git
    - https://kubernetes.github.io/ingress-nginx
    - https://charts.external-secrets.io
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: platform
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  roles:
    - name: platform-readonly
      policies:
        - p, proj:platform:platform-readonly, applications, get, platform/*, allow
      groups:
        - platform-readonly
