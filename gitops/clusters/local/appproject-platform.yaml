apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform components (ingress, eso, networkpolicy, external endpoints)
  sourceRepos:
    - https://github.com/buenhyden/hy-home.k8s.git
    - https://kubernetes.github.io/ingress-nginx
    - https://charts.external-secrets.io
    - https://charts.jetstack.io
    - https://istio-release.storage.googleapis.com/charts
    - https://kiali.org/helm-charts
    - https://kubernetes-sigs.github.io/headlamp/
    - https://argoproj.github.io/argo-helm
    - https://metallb.github.io/metallb
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: platform
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: istio-system
      server: https://kubernetes.default.svc
    - namespace: headlamp
      server: https://kubernetes.default.svc
    - namespace: argo-rollouts
      server: https://kubernetes.default.svc
    - namespace: metallb-system
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: apps
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: networking.k8s.io
      kind: IngressClass
    - group: cert-manager.io
      kind: ClusterIssuer
  namespaceResourceWhitelist:
    - group: ''
      kind: ServiceAccount
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: discovery.k8s.io
      kind: EndpointSlice
    - group: apps
      kind: Deployment
    - group: batch
      kind: Job
    - group: policy
      kind: PodDisruptionBudget
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: networking.k8s.io
      kind: Ingress
    - group: external-secrets.io
      kind: ExternalSecret
    - group: argoproj.io
      kind: Application
    - group: argoproj.io
      kind: ApplicationSet
    - group: argoproj.io
      kind: AppProject
    - group: kiali.io
      kind: Kiali
  roles:
    - name: platform-readonly
      policies:
        - p, proj:platform:platform-readonly, applications, get, platform/*, allow
      groups:
        - platform-readonly
