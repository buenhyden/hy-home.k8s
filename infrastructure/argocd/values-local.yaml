global:
  domain: argocd.127.0.0.1.nip.io

configs:
  params:
    server.insecure: true

redis:
  enabled: false

externalRedis:
  host: valkey-external.platform.svc.cluster.local
  port: 26379
  existingSecret: argocd-external-valkey
  passwordKey: redis-password

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.127.0.0.1.nip.io
    tls: false
    extraTls:
      - hosts:
          - argocd.127.0.0.1.nip.io
        secretName: argocd-local-tls

controller:
  metrics:
    enabled: true

repoServer:
  metrics:
    enabled: true
