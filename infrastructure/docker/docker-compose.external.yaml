name: hyhome-external-services

services:
  vault:
    image: hashicorp/vault:1.21.2
    container_name: vault-external
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: vault server -dev -dev-root-token-id=root
    ports:
      - "8200:8200"
    networks:
      external_net:
        ipv4_address: 172.30.0.10

  postgres:
    image: postgres:18.3
    container_name: postgres-external
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      external_net:
        ipv4_address: 172.30.0.11

  valkey:
    image: valkey/valkey:9.0.1
    container_name: valkey-external
    command:
      [
        "valkey-server",
        "--requirepass",
        "${VALKEY_PASSWORD:?VALKEY_PASSWORD is required}",
      ]
    ports:
      - "6379:6379"
    networks:
      external_net:
        ipv4_address: 172.30.0.12

networks:
  external_net:
    name: hyhome-external-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres_data:
