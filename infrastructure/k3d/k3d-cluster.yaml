apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: hyhome
image: rancher/k3s:v1.35.0-k3s1
servers: 1
agents: 3
kubeAPI:
  host: 0.0.0.0
  hostPort: '6550'
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
    timeout: '180s'
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
      - arg: --disable=servicelb
        nodeFilters:
          - server:*
