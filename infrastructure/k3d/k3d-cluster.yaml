apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: hyhome
servers: 1
agents: 3
kubeAPI:
  host: 0.0.0.0
  hostPort: "6550"
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
    timeout: "120s"
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
