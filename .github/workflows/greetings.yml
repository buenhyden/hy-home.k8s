name: Greeting

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

concurrency:
  group: greeting-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  greeting:
    permissions:
      issues: write # 코멘트/라벨 정도만 필요
      pull-requests: write # PR에 코멘트 남길 때
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message:
            "Welcome to the project! Thank you for opening your first issue. We
            will review it shortly."
          pr_message:
            "Welcome to the project! Thank you for your first Pull Request.
            We'll review your changes as soon as possible."
