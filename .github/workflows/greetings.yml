name: Greeting

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

permissions:
  contents: read

concurrency:
  group: greeting-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  greeting:
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message:
            "Welcome to the project! Thank you for opening your first issue. We
            will review it shortly."
          pr_message:
            "Welcome to the project! Thank you for your first Pull Request.
            We'll review your changes as soon as possible."
