name: Generate Changelog

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changelog:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Generate changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Upload changelog artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: changelog-${{ github.ref_name }}
          path: CHANGELOG.md
          if-no-files-found: error

      - name: Summarize changelog evidence
        run: |
          {
            echo "## Changelog evidence"
            echo ""
            echo "Generated changelog preview for tag \`${GITHUB_REF_NAME}\`."
            echo ""
            echo "Download \`CHANGELOG.md\` from this workflow run's artifacts."
            echo ""
            echo "Tracked changelog updates must be merged by PR before tagging."
          } >> "$GITHUB_STEP_SUMMARY"
