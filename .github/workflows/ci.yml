name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      precommit: ${{ steps.filter.outputs.precommit }}
      repo_quality: ${{ steps.filter.outputs.repo_quality }}
      manifests: ${{ steps.filter.outputs.manifests }}
      shell: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            precommit:
              - '**'
            repo_quality:
              - 'README.md'
              - 'docs/**'
              - '.github/**'
              - '.claude/**'
              - '.codex/**'
              - 'scripts/**'
              - '.pre-commit-config.yaml'
              - 'infrastructure/k3d/k3d-cluster.yaml'
              - 'gitops/apps/root/**'
            manifests:
              - 'gitops/**'
              - 'infrastructure/**/*.yaml'
              - 'infrastructure/**/*.yml'
              - 'examples/sample-app/**'
              - 'examples/**/gitops/**'
              - 'examples/**/kubernetes/**'
              - 'traefik/**'
            shell:
              - 'infrastructure/**/*.sh'
              - 'scripts/**/*.sh'

  pre-commit:
    needs: changes
    if: needs.changes.outputs.precommit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  repo-quality-static:
    needs: changes
    if: needs.changes.outputs.repo_quality == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install repository validation dependencies
        run: |
          python -m pip install --disable-pip-version-check pyyaml
      - name: Run repository quality gates
        run: |
          bash scripts/validate-repo-quality-gates.sh .

  manifest-static:
    needs: changes
    if: needs.changes.outputs.manifests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install manifest validation dependencies
        run: |
          python -m pip install --disable-pip-version-check pyyaml
      - name: Run static contract checks
        run: |
          bash infrastructure/tests/verify-contracts-static.sh
          bash scripts/validate-gitops-structure.sh
          bash scripts/validate-k8s-manifests.sh .
          bash scripts/check-secret-handling.sh .

  shell-static:
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Bash syntax check
        run: |
          mapfile -t shell_files < <(find infrastructure scripts -type f -name '*.sh' | sort)
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "no shell files matched shell-static scope"
            exit 0
          fi
          for file in "${shell_files[@]}"; do
            bash -n "$file"
          done

  ci-summary:
    needs:
      - changes
      - pre-commit
      - repo-quality-static
      - manifest-static
      - shell-static
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize CI result
        run: |
          echo "changes=${{ needs.changes.result }}"
          echo "pre-commit=${{ needs['pre-commit'].result }}"
          echo "repo-quality-static=${{ needs['repo-quality-static'].result }}"
          echo "manifest-static=${{ needs['manifest-static'].result }}"
          echo "shell-static=${{ needs['shell-static'].result }}"
      - name: Fail on gate failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "one or more required CI gates failed"
          exit 1
