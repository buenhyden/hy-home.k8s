name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      precommit: ${{ steps.filter.outputs.precommit }}
      manifests: ${{ steps.filter.outputs.manifests }}
      workflows: ${{ steps.filter.outputs.workflows }}
      shell: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            precommit:
              - '**'
            manifests:
              - 'gitops/**'
              - 'infrastructure/**/*.yaml'
              - 'infrastructure/**/*.yml'
              - 'examples/sample-app/**'
              - 'examples/**/gitops/**'
              - 'examples/**/kubernetes/**'
              - 'traefik/**'
            workflows:
              - '.github/**'
            shell:
              - '.github/gates/*.sh'
              - 'infrastructure/**/*.sh'
              - 'scripts/**/*.sh'

  pre-commit:
    needs: changes
    if: needs.changes.outputs.precommit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  manifest-static:
    needs: changes
    if: needs.changes.outputs.manifests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install manifest validation dependencies
        run: |
          python -m pip install --disable-pip-version-check pyyaml
      - name: Run static contract checks
        run: |
          bash infrastructure/tests/verify-contracts-static.sh
          bash scripts/validate-gitops-structure.sh
          bash scripts/validate-k8s-manifests.sh .
          bash scripts/check-secret-handling.sh .

  workflow-security:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run actionlint
        run: |
          docker run --rm -v "$PWD:/work" -w /work rhysd/actionlint:latest -color
      - name: Run zizmor
        run: |
          docker run --rm -v "$PWD:/work" -w /work ghcr.io/zizmorcore/zizmor:latest .

  shell-static:
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Bash syntax check
        run: |
          mapfile -t shell_files < <(find .github/gates infrastructure scripts -type f -name '*.sh' | sort)
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "no shell files matched shell-static scope"
            exit 0
          fi
          for file in "${shell_files[@]}"; do
            bash -n "$file"
          done
      - name: Shellcheck
        run: |
          mapfile -t shell_files < <(find .github/gates infrastructure scripts -type f -name '*.sh' | sort)
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "no shell files matched shell-static scope"
            exit 0
          fi
          shellcheck "${shell_files[@]}"

  ci-summary:
    needs:
      - changes
      - pre-commit
      - manifest-static
      - workflow-security
      - shell-static
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize CI result
        run: |
          echo "changes=${{ needs.changes.result }}"
          echo "pre-commit=${{ needs['pre-commit'].result }}"
          echo "manifest-static=${{ needs['manifest-static'].result }}"
          echo "workflow-security=${{ needs['workflow-security'].result }}"
          echo "shell-static=${{ needs['shell-static'].result }}"
      - name: Fail on gate failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "one or more required CI gates failed"
          exit 1
