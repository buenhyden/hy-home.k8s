name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate pull request branch policy
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          allowed_branch_regex='^(feat|fix|docs|refactor|test|chore|ci|release|hotfix|codex|dependabot)/'
          if [ "$BASE_REF" != "main" ]; then
            echo "PR base branch must be main, got: $BASE_REF"
            exit 1
          fi
          if ! [[ "$HEAD_REF" =~ $allowed_branch_regex ]]; then
            echo "PR source branch must start with one of: feat/, fix/, docs/, refactor/, test/, chore/, ci/, release/, hotfix/, codex/, dependabot/"
            echo "got: $HEAD_REF"
            exit 1
          fi
          printf 'branch-policy=ok base=%s head=%s\n' "$BASE_REF" "$HEAD_REF"

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      precommit: ${{ steps.filter.outputs.precommit }}
      repo_quality: ${{ steps.filter.outputs.repo_quality }}
      manifests: ${{ steps.filter.outputs.manifests }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Select affected CI jobs
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          ZERO_SHA: "0000000000000000000000000000000000000000"
        run: |
          set -euo pipefail
          if [ -z "$HEAD_SHA" ]; then
            echo "head SHA is required for affected-surface selection" >&2
            exit 1
          fi
          case "$EVENT_NAME" in
            push)
              if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "$ZERO_SHA" ] && \
                git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
                git diff --name-only -z "$BEFORE_SHA" "$HEAD_SHA" > "$RUNNER_TEMP/changed-paths.nul"
              else
                git ls-tree -r --name-only -z "$HEAD_SHA" > "$RUNNER_TEMP/changed-paths.nul"
              fi
              ;;
            pull_request)
              if [ -z "$BASE_SHA" ]; then
                echo "base SHA is required for pull-request affected-surface selection" >&2
                exit 1
              fi
              git diff --name-only -z "$BASE_SHA" "$HEAD_SHA" > "$RUNNER_TEMP/changed-paths.nul"
              ;;
            workflow_dispatch)
              git ls-tree -r --name-only -z "$HEAD_SHA" > "$RUNNER_TEMP/changed-paths.nul"
              ;;
            *)
              echo "unsupported event for affected-surface selection: $EVENT_NAME" >&2
              exit 1
              ;;
          esac
          python3 scripts/select-affected-surfaces.py \
            --root . \
            --lane ci \
            --paths-file "$RUNNER_TEMP/changed-paths.nul" \
            --delimiter nul \
            --format github-output >> "$GITHUB_OUTPUT"

  pre-commit:
    needs: changes
    if: needs.changes.outputs.precommit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  repo-quality-static:
    needs: changes
    if: needs.changes.outputs.repo_quality == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.x'
      - name: Install repository validation dependencies
        run: |
          python -m pip install --disable-pip-version-check pyyaml jsonschema
      - name: Run repository quality gates
        run: |
          bash scripts/validate-repo-quality-gates.sh .

  manifest-static:
    needs: changes
    if: needs.changes.outputs.manifests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.x'
      - name: Install manifest validation dependencies
        run: |
          python -m pip install --disable-pip-version-check pyyaml
      - name: Run static contract checks
        run: |
          bash infrastructure/tests/verify-contracts-static.sh
          bash scripts/validate-gitops-structure.sh
          bash scripts/validate-k8s-manifests.sh .
          bash scripts/check-secret-handling.sh .
          bash scripts/validate-policy-gates.sh .



  ci-summary:
    needs:
      - branch-policy
      - changes
      - pre-commit
      - repo-quality-static
      - manifest-static
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Summarize CI result
        env:
          BRANCH_POLICY_RESULT: ${{ needs['branch-policy'].result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          PRE_COMMIT_RESULT: ${{ needs['pre-commit'].result }}
          REPO_QUALITY_STATIC_RESULT: ${{ needs['repo-quality-static'].result }}
          MANIFEST_STATIC_RESULT: ${{ needs['manifest-static'].result }}
        run: |
          printf 'branch-policy=%s\n' "$BRANCH_POLICY_RESULT"
          printf 'changes=%s\n' "$CHANGES_RESULT"
          printf 'pre-commit=%s\n' "$PRE_COMMIT_RESULT"
          printf 'repo-quality-static=%s\n' "$REPO_QUALITY_STATIC_RESULT"
          printf 'manifest-static=%s\n' "$MANIFEST_STATIC_RESULT"
      - name: Fail on gate failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "one or more required CI gates failed"
          exit 1
