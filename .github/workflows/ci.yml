name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate pull request branch policy
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          allowed_branch_regex='^(feat|fix|docs|refactor|chore|ci|release|hotfix|codex|dependabot)/'
          if [ "$BASE_REF" != "main" ]; then
            echo "PR base branch must be main, got: $BASE_REF"
            exit 1
          fi
          if ! [[ "$HEAD_REF" =~ $allowed_branch_regex ]]; then
            echo "PR source branch must start with one of: feat/, fix/, docs/, refactor/, chore/, ci/, release/, hotfix/, codex/, dependabot/"
            echo "got: $HEAD_REF"
            exit 1
          fi
          printf 'branch-policy=ok base=%s head=%s\n' "$BASE_REF" "$HEAD_REF"

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      precommit: ${{ steps.filter.outputs.precommit }}
      repo_quality: ${{ steps.filter.outputs.repo_quality }}
      manifests: ${{ steps.filter.outputs.manifests }}
      shell: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            precommit:
              - '**'
            repo_quality:
              - 'README.md'
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - 'GEMINI.md'
              - 'RTK.md'
              - 'cliff.toml'
              - 'docs/**'
              - '.github/**'
              - '.claude/**'
              - '.codex/**'
              - 'scripts/**'
              - '.pre-commit-config.yaml'
              - 'infrastructure/k3d/k3d-cluster.yaml'
              - 'gitops/apps/root/**'
            manifests:
              - 'gitops/**'
              - 'infrastructure/**/*.yaml'
              - 'infrastructure/**/*.yml'
              - 'infrastructure/tests/**/*.sh'
              - '.kube-linter.yaml'
              - 'examples/sample-app/**'
              - 'examples/**/gitops/**'
              - 'examples/**/kubernetes/**'
              - 'scripts/validate-gitops-structure.sh'
              - 'scripts/validate-k8s-manifests.sh'
              - 'scripts/check-secret-handling.sh'
              - 'traefik/**'
            shell:
              - 'infrastructure/**/*.sh'
              - 'scripts/**/*.sh'
              - '.claude/hooks/**/*.sh'

  pre-commit:
    needs: changes
    if: needs.changes.outputs.precommit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  repo-quality-static:
    needs: changes
    if: needs.changes.outputs.repo_quality == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install repository validation dependencies
        run: |
          python -m pip install --disable-pip-version-check pyyaml
      - name: Run repository quality gates
        run: |
          bash scripts/validate-repo-quality-gates.sh .

  manifest-static:
    needs: changes
    if: needs.changes.outputs.manifests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install manifest validation dependencies
        run: |
          python -m pip install --disable-pip-version-check pyyaml
      - name: Run static contract checks
        run: |
          bash infrastructure/tests/verify-contracts-static.sh
          bash scripts/validate-gitops-structure.sh
          bash scripts/validate-k8s-manifests.sh .
          bash scripts/check-secret-handling.sh .

  shell-static:
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Bash syntax check
        run: |
          mapfile -t shell_files < <(
            for dir in infrastructure scripts .claude/hooks; do
              if [ -d "$dir" ]; then
                find "$dir" -type f -name '*.sh'
              fi
            done | sort
          )
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "no shell files matched shell-static scope"
            exit 0
          fi
          for file in "${shell_files[@]}"; do
            bash -n "$file"
          done

  ci-summary:
    needs:
      - branch-policy
      - changes
      - pre-commit
      - repo-quality-static
      - manifest-static
      - shell-static
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Summarize CI result
        env:
          BRANCH_POLICY_RESULT: ${{ needs['branch-policy'].result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          PRE_COMMIT_RESULT: ${{ needs['pre-commit'].result }}
          REPO_QUALITY_STATIC_RESULT: ${{ needs['repo-quality-static'].result }}
          MANIFEST_STATIC_RESULT: ${{ needs['manifest-static'].result }}
          SHELL_STATIC_RESULT: ${{ needs['shell-static'].result }}
        run: |
          printf 'branch-policy=%s\n' "$BRANCH_POLICY_RESULT"
          printf 'changes=%s\n' "$CHANGES_RESULT"
          printf 'pre-commit=%s\n' "$PRE_COMMIT_RESULT"
          printf 'repo-quality-static=%s\n' "$REPO_QUALITY_STATIC_RESULT"
          printf 'manifest-static=%s\n' "$MANIFEST_STATIC_RESULT"
          printf 'shell-static=%s\n' "$SHELL_STATIC_RESULT"
      - name: Fail on gate failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "one or more required CI gates failed"
          exit 1
