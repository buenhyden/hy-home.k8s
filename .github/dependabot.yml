version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - '*'
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directories:
      - /infrastructure
      - /apps
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
    groups:
      docker-infra:
        patterns:
          - '*'
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directory: /apps/_examples/demo-backend/app
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python
    groups:
      python-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 7
