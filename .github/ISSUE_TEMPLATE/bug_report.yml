name: Bug Report
description: Report a defect with reproducible details
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please provide enough detail to reproduce and validate the fix.
  - type: input
    id: spec_link
    attributes:
      label: Related Spec Link
      description: Link to the related spec in `docs/04.specs/` if available.
      placeholder: https://github.com/<org>/<repo>/blob/main/docs/04.specs/<spec>/spec.md
    validations:
      required: false
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered steps with exact inputs
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, WSL/Docker Desktop, k3d/k3s, kubectl, Helm, ArgoCD, and relevant GitHub Actions run if applicable.
      placeholder: Ubuntu 24.04 WSL2 / Docker Desktop 4.x / k3d 5.x / k3s v1.35.x / kubectl v1.35.x / ArgoCD 3.x
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Initial impact estimate
      options:
        - low
        - medium
        - high
        - critical
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics / Logs
      description:
        Paste relevant static validator output, ArgoCD application state, CI run link, or redacted logs. Do not include secrets, kubeconfigs, tokens, or private Vault data.
    validations:
      required: false
