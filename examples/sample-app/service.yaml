# Service — Istio 프로토콜 자동 감지를 위해 port name에 http- 접두사 사용
# Istio는 port 이름이 http-* 이면 HTTP 프로토콜로 처리하여 메트릭/트레이싱을 자동 수집한다.
apiVersion: v1
kind: Service
metadata:
  name: <appname>
  namespace: apps
  labels:
    app.kubernetes.io/name: <appname>
    app.kubernetes.io/component: web
spec:
  selector:
    app.kubernetes.io/name: <appname>
  ports:
    - name: http-<appname> # 반드시 http- 접두사 사용 (Istio 프로토콜 감지)
      port: <port>
      targetPort: <port>
