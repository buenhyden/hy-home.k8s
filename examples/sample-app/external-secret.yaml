# ExternalSecret — Vault 시크릿 연동 (선택 사항)
#
# 전제:
#   - Vault에 secret/apps/<appname>/config 경로로 시크릿이 존재해야 한다.
#   - vault-backend ClusterSecretStore가 정상 동작해야 한다.
#   - Vault 정책(infrastructure/vault/policies/eso-read.hcl)에
#     'path "secret/data/apps/<appname>/*"' 가 추가되어야 한다.
#
# 사용 방법:
#   1. kustomization.yaml에서 external-secret.yaml 주석 해제
#   2. rollout.yaml container spec에 envFrom 추가:
#      envFrom:
#        - secretRef:
#            name: <appname>-secret
#
# Vault에 시크릿 등록:
#   vault kv put secret/apps/<appname>/config \
#     db_password=<value> \
#     api_key=<value>
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: <appname>-secret
  namespace: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: <appname>-secret # pragma: allowlist secret
    creationPolicy: Owner
  data:
    - secretKey: db_password # pragma: allowlist secret
      remoteRef:
        key: secret/apps/<appname>/config
        property: db_password
    - secretKey: api_key # pragma: allowlist secret
      remoteRef:
        key: secret/apps/<appname>/config
        property: api_key
