# Azure Sample Application (with Workload Identity & Key Vault)

apiVersion: v1
kind: ServiceAccount
metadata:
  name: hy-home-sa
  namespace: apps
  annotations:
    azure.workload.identity/client-id: "YOUR_MANAGED_IDENTITY_CLIENT_ID" # Replace via Bicep output

---
# 2. SecretProviderClass for Azure Key Vault
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kvname-user-msi
  namespace: apps
spec:
  provider: azure
  secretObjects: # Sync KV to K8s Secret
    - secretName: db-secret # pragma: allowlist secret
      type: Opaque
      data:
        - objectName: db-password
          key: password # pragma: allowlist secret
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    userAssignedIdentityID: ""
    keyvaultName: "hy-home-kv"
    cloudName: ""
    objects: |
      array:
        - |
          objectName: db-password
          objectType: secret
          objectVersion: ""
    tenantId: "YOUR_TENANT_ID"

---
# 3. Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: apps
  labels:
    azure.workload.identity/use: "true" # Enables Workload Identity mutation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      serviceAccountName: hy-home-sa
      containers:
        - name: web
          image: nginx:latest # Replace with your app image
          ports:
            - containerPort: 80
          env:
            - name: DATABASE_HOST
              value: "hy-home-pg-server.postgres.database.azure.com"
            - name: REDIS_HOST
              value: "hy-home-redis-cache.redis.cache.windows.com"
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "azure-kvname-user-msi" # pragma: allowlist secret
