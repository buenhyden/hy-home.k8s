# Platform-level Secret Provider Class (for Azure Key Vault)
# Path: examples/azure/gitops/platform/secret-provider-class.yaml

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-platform-kv
  namespace: platform
spec:
  provider: azure
  secretObjects: # Syncing KV secrets to K8s Secrets for broader compatibility
    - secretName: platform-shared-db-secret
      type: Opaque
      data:
        - objectName: db-admin-password
          key: password
    - secretName: redis-access-key
      type: Opaque
      data:
        - objectName: redis-key
          key: password
  parameters:
    usePodIdentity: "false"     # Using Workload Identity instead
    useVMManagedIdentity: "false"
    userAssignedIdentityID: ""  # Provided via Workload Identity
    keyvaultName: "hy-home-kv"
    tenantId: "YOUR_TENANT_ID"
    cloudName: ""
    objects: |
      array:
        - |
          objectName: db-admin-password
          objectType: secret
        - |
          objectName: redis-key
          objectType: secret
