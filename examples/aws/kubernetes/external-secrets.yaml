# External Secrets Configuration (AWS 2026)
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      # Auth via Pod Identity (Implicitly uses the role associated with the service account)
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-db-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: db-credentials # Kubernetes Secret Name to create
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: "${cluster_name}-app-secrets"
      property: DB_PASSWORD
  - secretKey: redis-auth
    remoteRef:
      key: "${cluster_name}-app-secrets"
      property: REDIS_PASSWORD
